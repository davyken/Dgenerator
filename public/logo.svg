<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <linearGradient id="iconbg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="56" height="56" rx="13" fill="url(#iconbg)"/>

  <!-- QR corner: top-left -->
  <rect x="7" y="7" width="13" height="13" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="10" y="10" width="7" height="7" rx="1" fill="#7c3aed"/>
  <rect x="12" y="12" width="3" height="3" rx="0.5" fill="white"/>

  <!-- QR corner: top-right -->
  <rect x="36" y="7" width="13" height="13" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="39" y="10" width="7" height="7" rx="1" fill="#7c3aed"/>
  <rect x="41" y="12" width="3" height="3" rx="0.5" fill="white"/>

  <!-- QR corner: bottom-left -->
  <rect x="7" y="36" width="13" height="13" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="10" y="39" width="7" height="7" rx="1" fill="#7c3aed"/>
  <rect x="12" y="41" width="3" height="3" rx="0.5" fill="white"/>

  <!-- QR data dots: bottom-right -->
  <rect x="36" y="36" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
  <rect x="44" y="36" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
  <rect x="36" y="44" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
  <rect x="44" y="44" width="5" height="5" rx="1" fill="white" opacity="0.5"/>

  <!-- Middle dots -->
  <rect x="24" y="7"  width="4" height="4" rx="1" fill="white" opacity="0.65"/>
  <rect x="7"  y="24" width="4" height="4" rx="1" fill="white" opacity="0.65"/>
  <rect x="24" y="24" width="4" height="4" rx="1" fill="white" opacity="0.85"/>
  <rect x="30" y="24" width="4" height="4" rx="1" fill="white" opacity="0.55"/>
  <rect x="24" y="30" width="4" height="4" rx="1" fill="white" opacity="0.55"/>
  <rect x="30" y="30" width="4" height="4" rx="1" fill="white" opacity="0.85"/>

  <!-- Wordmark: DGenerator -->
  <text
    x="68"
    y="38"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#textgrad)"
  >DGenerator</text>
</svg>
